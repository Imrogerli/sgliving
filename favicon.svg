<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8533a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- 水柱 (蓝色水滴，从头顶喷出) -->
  <ellipse cx="16" cy="3.5" rx="1.7" ry="2.9" fill="rgba(130,215,255,0.92)"/>
  <ellipse cx="12.2" cy="5.8" rx="1.3" ry="2.1" fill="rgba(130,215,255,0.75)"/>
  <ellipse cx="19.8" cy="5.8" rx="1.3" ry="2.1" fill="rgba(130,215,255,0.75)"/>

  <!-- 鬃毛 (淡色大圆，在头部后方) -->
  <circle cx="16" cy="14.5" r="9.2" fill="rgba(255,220,155,0.42)"/>

  <!-- 鱼尾巴 -->
  <path d="M 9.5 20.5 Q 7 26.5 8.5 30.5 Q 12 28.5 16 29 Q 20 28.5 23.5 30.5 Q 25 26.5 22.5 20.5 Q 20 23 16 23 Q 12 23 9.5 20.5 Z" fill="white" opacity="0.93"/>

  <!-- 鳞纹装饰 -->
  <path d="M 11 24.5 Q 16 26 21 24.5" fill="none" stroke="rgba(232,83,58,0.2)" stroke-width="0.7"/>

  <!-- 头部 -->
  <circle cx="16" cy="14.5" r="7.8" fill="white"/>

  <!-- 耳朵 (狮子耳) -->
  <path d="M 9.5 10.5 Q 7.5 7 11.5 9" fill="none" stroke="rgba(255,205,140,0.95)" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M 22.5 10.5 Q 24.5 7 20.5 9" fill="none" stroke="rgba(255,205,140,0.95)" stroke-width="2.4" stroke-linecap="round"/>

  <!-- 眼睛 -->
  <circle cx="13" cy="13.5" r="1.85" fill="#c0392b"/>
  <circle cx="19" cy="13.5" r="1.85" fill="#c0392b"/>
  <!-- 眼白高光 -->
  <circle cx="13.65" cy="12.8" r="0.72" fill="white"/>
  <circle cx="19.65" cy="12.8" r="0.72" fill="white"/>

  <!-- 腮红 -->
  <ellipse cx="10.8" cy="16.2" rx="1.9" ry="1.1" fill="rgba(255,120,90,0.22)"/>
  <ellipse cx="21.2" cy="16.2" rx="1.9" ry="1.1" fill="rgba(255,120,90,0.22)"/>

  <!-- 鼻子 -->
  <ellipse cx="16" cy="16.2" rx="1.1" ry="0.75" fill="#c0392b" opacity="0.48"/>

  <!-- 嘴 (微笑) -->
  <path d="M 13.8 17.8 Q 16 19.4 18.2 17.8" fill="none" stroke="#c0392b" stroke-width="0.85" stroke-linecap="round" opacity="0.55"/>
</svg>
